<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dream Villa VR Experience</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    #loading-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 40%, #16213e 70%, #0f3460 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Georgia', serif;
      transition: opacity 1.2s ease, visibility 1.2s ease;
    }
    #loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .villa-title {
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #e8d5a3;
      text-shadow: 0 0 40px rgba(232,213,163,0.4), 0 0 80px rgba(232,213,163,0.15);
      margin-bottom: 0.3em;
    }
    .villa-subtitle {
      font-size: clamp(0.8rem, 2vw, 1rem);
      letter-spacing: 0.6em;
      text-transform: uppercase;
      color: #7a9bb5;
      margin-bottom: 3em;
    }
    .progress-container {
      width: min(400px, 80vw);
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 1.5em;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #e8d5a3, #c9a96e, #e8d5a3);
      background-size: 200% 100%;
      border-radius: 2px;
      animation: shimmer 1.5s linear infinite;
      width: 0%;
      transition: width 0.3s ease;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .loading-text {
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #4a6a85;
    }

    #ui-overlay {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 100; display: flex; gap: 12px;
      font-family: 'Georgia', serif;
    }
    .ui-btn {
      padding: 8px 20px;
      background: rgba(10,10,20,0.75);
      border: 1px solid rgba(232,213,163,0.35);
      color: #e8d5a3;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(8px);
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    .ui-btn:hover { background: rgba(232,213,163,0.15); border-color: #e8d5a3; }

    #room-label {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      z-index: 100;
      font-family: 'Georgia', serif;
      font-size: 0.75rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(232,213,163,0.8);
      background: rgba(0,0,0,0.5);
      padding: 8px 24px;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(232,213,163,0.2);
      border-radius: 2px;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="villa-title">Dream Villa</div>
  <div class="villa-subtitle">VR Experience</div>
  <div class="progress-container">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div class="loading-text" id="loading-text">Initialising scene…</div>
</div>

<!-- UI -->
<div id="ui-overlay" style="display:none;">
  <button class="ui-btn" onclick="teleport('living')">Living Room</button>
  <button class="ui-btn" onclick="teleport('bedroom')">Bedroom</button>
  <button class="ui-btn" onclick="teleport('kitchen')">Kitchen</button>
  <button class="ui-btn" onclick="teleport('pool')">Pool</button>
  <button class="ui-btn" onclick="teleport('garden')">Garden</button>
</div>
<div id="room-label">Welcome — Use WASD / Look around</div>

<a-scene
  id="main-scene"
  renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true; toneMapping: ACESFilmic"
  shadow="type: pcfsoft"
  fog="type: exponential; color: #87CEEB; density: 0.008"
>

  <a-assets timeout="15000"></a-assets>

  <!-- ═══ SKY & LIGHTS ═══ -->
  <a-sky color="#87CEEB"></a-sky>
  <a-light type="directional" position="30 40 -20" intensity="1.8" color="#fff5e0"
    cast-shadow="true" shadow-camera-far="150"
    shadow-camera-left="-60" shadow-camera-right="60"
    shadow-camera-top="60" shadow-camera-bottom="-60">
  </a-light>
  <a-light type="ambient" color="#c8d8f0" intensity="0.55"></a-light>
  <a-light type="point" position="12 3 -8" color="#40c8ff" intensity="0.6" distance="25"></a-light>

  <!-- ═══ GROUND & SURROUNDINGS ═══ -->
  <a-plane position="0 0 0" rotation="-90 0 0" width="80" height="80"
    material="color:#4a7c3f; roughness:0.9; metalness:0.0" shadow="receive: true">
  </a-plane>
  <a-plane position="-18 0.01 5" rotation="-90 0 0" width="10" height="30"
    material="color:#b0a090; roughness:0.8">
  </a-plane>
  <!-- Perimeter walls -->
  <a-box position="0 1 -40" width="80" height="2" depth="0.4" material="color:#d4cfc8"></a-box>
  <a-box position="0 1 40"  width="80" height="2" depth="0.4" material="color:#d4cfc8"></a-box>
  <a-box position="-40 1 0" width="0.4" height="2" depth="80" material="color:#d4cfc8"></a-box>
  <a-box position="40 1 0"  width="0.4" height="2" depth="80" material="color:#d4cfc8"></a-box>

  <!-- ═══════════════════════════════════════════════
       VILLA EXTERIOR SHELL
       NOTE: Exterior boxes are for visual silhouette only.
       Interior wall planes (below) form the walkable enclosure
       and face inward so they never get back-face culled.
  ═══════════════════════════════════════════════ -->
  <!-- Main body exterior -->
  <a-box position="2 3 0" width="22" height="6" depth="14"
    material="color:#f5f0e8; roughness:0.7; metalness:0.05; side:front"
    shadow="cast:true; receive:true">
  </a-box>
  <!-- Roof -->
  <a-box position="2 6.4 0" width="23" height="0.5" depth="15"
    material="color:#8b7355; roughness:0.85">
  </a-box>
  <!-- Left wing exterior (bedroom + kitchen) -->
  <a-box position="-7 2.5 -8" width="8" height="5" depth="6"
    material="color:#f0ece2; roughness:0.7; side:front"
    shadow="cast:true; receive:true">
  </a-box>
  <a-box position="-7 5.15 -8" width="9" height="0.3" depth="7" material="color:#7a6345"></a-box>
  <!-- Right wing exterior -->
  <a-box position="11 2 8" width="8" height="4" depth="8"
    material="color:#ece8df; roughness:0.75; side:front"
    shadow="cast:true; receive:true">
  </a-box>
  <a-box position="11 4.15 8" width="9" height="0.3" depth="9" material="color:#7a6345"></a-box>
  <!-- Flat roof terrace -->
  <a-box position="2 0.25 12" width="16" height="0.5" depth="8"
    material="color:#c8c0b0; roughness:0.85">
  </a-box>

  <!-- ─── Windows ─── -->
  <a-box position="-2 3.5 7.06" width="3" height="2" depth="0.05" material="color:#a8d4f0; transparent:true; opacity:0.55; metalness:0.3"></a-box>
  <a-box position="3 3.5 7.06"  width="3" height="2" depth="0.05" material="color:#a8d4f0; transparent:true; opacity:0.55; metalness:0.3"></a-box>
  <a-box position="8 3.5 7.06"  width="3" height="2" depth="0.05" material="color:#a8d4f0; transparent:true; opacity:0.55; metalness:0.3"></a-box>
  <a-box position="-10.06 3 -6" width="0.05" height="2" depth="2.5" material="color:#a8d4f0; transparent:true; opacity:0.55; metalness:0.3"></a-box>
  <a-box position="-10.06 3 -9" width="0.05" height="2" depth="2.5" material="color:#a8d4f0; transparent:true; opacity:0.55; metalness:0.3"></a-box>

  <!-- Main entrance door -->
  <a-box position="2 1.5 7.08" width="1.8" height="3" depth="0.05"
    material="color:#5c3d1e; roughness:0.8; metalness:0.1">
  </a-box>
  <a-sphere position="2.6 1.5 7.12" radius="0.08" material="color:#d4af37; metalness:0.9; roughness:0.1"></a-sphere>

  <!-- Columns / porch -->
  <a-cylinder position="-1 1.5 8.5" radius="0.2" height="3" material="color:#f0ece2"></a-cylinder>
  <a-cylinder position="5 1.5 8.5"  radius="0.2" height="3" material="color:#f0ece2"></a-cylinder>
  <a-box position="2 3.05 8.5" width="8" height="0.2" depth="0.4" material="color:#e8e2d8"></a-box>
  <!-- Steps -->
  <a-box position="2 0.15 8"   width="4"   height="0.3" depth="1"   material="color:#c8bfae"></a-box>
  <a-box position="2 0.05 8.5" width="4.5" height="0.1" depth="0.6" material="color:#c8bfae"></a-box>

  <!-- ═══════════════════════════════════════════════
       INTERIOR WALL PLANES
       These are double-sided planes that sit just inside the
       exterior shell, ensuring you always see a surface when
       inside a room. Each wall's "front" faces the room interior.

       LIVING ROOM bounds: X -9..13, Z -6..7  (main shell)
       BEDROOM bounds:     X -11..-3, Z -11..-5  (left wing)
       KITCHEN bounds:     X 2..10, Z -7..-1
  ═══════════════════════════════════════════════ -->

  <!-- ─── LIVING ROOM interior walls ─── -->
  <!-- Floor -->
  <a-plane position="2 0.02 1" rotation="-90 0 0" width="20" height="12"
    material="color:#c4a882; roughness:0.5; side:double">
  </a-plane>
  <!-- Ceiling -->
  <a-plane position="2 6 1" rotation="90 0 0" width="20" height="12"
    material="color:#f8f5ef; roughness:0.9; side:double">
  </a-plane>
  <!-- Back wall (north, -Z side) -->
  <a-plane position="2 3 -6" rotation="0 0 0" width="20" height="6"
    material="color:#f2ede4; roughness:0.8; side:double">
  </a-plane>
  <!-- Front wall (south, +Z side) — has door gap, split left/right -->
  <a-plane position="-3.5 3 7" rotation="0 180 0" width="9" height="6"
    material="color:#f2ede4; roughness:0.8; side:double">
  </a-plane>
  <a-plane position="7.5 3 7" rotation="0 180 0" width="7" height="6"
    material="color:#f2ede4; roughness:0.8; side:double">
  </a-plane>
  <!-- Front wall above door -->
  <a-plane position="2 5.2 7" rotation="0 180 0" width="3" height="1.5"
    material="color:#f2ede4; roughness:0.8; side:double">
  </a-plane>
  <!-- Left wall (west, -X side) -->
  <a-plane position="-9 3 1" rotation="0 90 0" width="12" height="6"
    material="color:#f2ede4; roughness:0.8; side:double">
  </a-plane>
  <!-- Right wall (east, +X side) -->
  <a-plane position="13 3 1" rotation="0 -90 0" width="12" height="6"
    material="color:#f2ede4; roughness:0.8; side:double">
  </a-plane>

  <!-- ─── BEDROOM interior walls ─── -->
  <!-- Floor -->
  <a-plane position="-7 0.02 -8" rotation="-90 0 0" width="7.5" height="5.5"
    material="color:#d4c4a8; roughness:0.6; side:double">
  </a-plane>
  <!-- Ceiling -->
  <a-plane position="-7 5 -8" rotation="90 0 0" width="7.5" height="5.5"
    material="color:#f8f5ef; roughness:0.9; side:double">
  </a-plane>
  <!-- Back wall (-Z) -->
  <a-plane position="-7 2.5 -11" rotation="0 0 0" width="7.5" height="5"
    material="color:#f0ece5; roughness:0.8; side:double">
  </a-plane>
  <!-- Front wall (+Z, opens toward living room) -->
  <a-plane position="-7 2.5 -5" rotation="0 180 0" width="7.5" height="5"
    material="color:#f0ece5; roughness:0.8; side:double">
  </a-plane>
  <!-- Left wall (-X) -->
  <a-plane position="-10.5 2.5 -8" rotation="0 90 0" width="5.5" height="5"
    material="color:#f0ece5; roughness:0.8; side:double">
  </a-plane>
  <!-- Right wall (+X) -->
  <a-plane position="-3.5 2.5 -8" rotation="0 -90 0" width="5.5" height="5"
    material="color:#f0ece5; roughness:0.8; side:double">
  </a-plane>

  <!-- ─── KITCHEN interior walls ─── -->
  <!-- Floor -->
  <a-plane position="6 0.02 -4" rotation="-90 0 0" width="8" height="7"
    material="color:#d8d0c0; roughness:0.4; side:double">
  </a-plane>
  <!-- Ceiling -->
  <a-plane position="6 6 -4" rotation="90 0 0" width="8" height="7"
    material="color:#f5f3ef; roughness:0.9; side:double">
  </a-plane>
  <!-- Back wall (-Z) -->
  <a-plane position="6 3 -7.5" rotation="0 0 0" width="8" height="6"
    material="color:#f0ede8; roughness:0.8; side:double">
  </a-plane>
  <!-- Front wall (+Z) -->
  <a-plane position="6 3 -0.5" rotation="0 180 0" width="8" height="6"
    material="color:#f0ede8; roughness:0.8; side:double">
  </a-plane>
  <!-- Left wall (-X side toward bedroom) -->
  <a-plane position="2 3 -4" rotation="0 90 0" width="7" height="6"
    material="color:#f0ede8; roughness:0.8; side:double">
  </a-plane>
  <!-- Right wall (+X, counter side) -->
  <a-plane position="10 3 -4" rotation="0 -90 0" width="7" height="6"
    material="color:#f0ede8; roughness:0.8; side:double">
  </a-plane>

  <!-- ═══ LIVING ROOM FURNITURE ═══ -->
  <!-- SOFA -->
  <a-box position="-1 0.4 0"    width="3.5" height="0.5" depth="1.2" material="color:#8b6f5c; roughness:0.9"></a-box>
  <a-box position="-1 0.85 -0.5" width="3.5" height="0.7" depth="0.35" material="color:#8b6f5c; roughness:0.9"></a-box>
  <a-box position="-2.9 0.7 0"  width="0.35" height="0.6" depth="1.2" material="color:#8b6f5c; roughness:0.9"></a-box>
  <a-box position="0.9 0.7 0"   width="0.35" height="0.6" depth="1.2" material="color:#8b6f5c; roughness:0.9"></a-box>
  <a-box position="-2 0.68 0.1" width="0.9" height="0.22" depth="0.9" material="color:#a08070; roughness:0.8"></a-box>
  <a-box position="-1 0.68 0.1" width="0.9" height="0.22" depth="0.9" material="color:#9b7b6a; roughness:0.8"></a-box>
  <a-box position="0 0.68 0.1"  width="0.9" height="0.22" depth="0.9" material="color:#a08070; roughness:0.8"></a-box>
  <!-- COFFEE TABLE -->
  <a-box position="-1 0.35 1.8" width="1.8" height="0.08" depth="0.9" material="color:#3a2510; roughness:0.5; metalness:0.05"></a-box>
  <a-cylinder position="-1.5 0.175 1.4" radius="0.05" height="0.35" material="color:#2a1a08"></a-cylinder>
  <a-cylinder position="-0.5 0.175 1.4" radius="0.05" height="0.35" material="color:#2a1a08"></a-cylinder>
  <a-cylinder position="-1.5 0.175 2.2" radius="0.05" height="0.35" material="color:#2a1a08"></a-cylinder>
  <a-cylinder position="-0.5 0.175 2.2" radius="0.05" height="0.35" material="color:#2a1a08"></a-cylinder>
  <a-sphere position="-1 0.46 1.8" radius="0.18" material="color:#c47f3a; roughness:0.6"></a-sphere>
  <!-- TV UNIT -->
  <a-box position="4 0.4 -3"   width="2.5" height="0.8" depth="0.5" material="color:#1a1a1a; roughness:0.8"></a-box>
  <a-box position="4 1.6 -3.1" width="2.2" height="1.3" depth="0.08" material="color:#111; roughness:0.1; metalness:0.3"></a-box>
  <a-light type="point" position="4 1.6 -2.8" color="#3399ff" intensity="0.4" distance="5"></a-light>
  <!-- BOOKSHELF -->
  <a-box position="-3 1.5 -4.5"  width="0.3" height="3" depth="1.2" material="color:#5c3d1e; roughness:0.7"></a-box>
  <a-box position="-2.7 2.85 -4.5" width="0.6" height="0.08" depth="1.2" material="color:#5c3d1e; roughness:0.7"></a-box>
  <a-box position="-2.7 1.85 -4.5" width="0.6" height="0.08" depth="1.2" material="color:#5c3d1e; roughness:0.7"></a-box>
  <a-box position="-2.6 2.2 -4.2" width="0.08" height="0.6" depth="0.2" material="color:#c0392b"></a-box>
  <a-box position="-2.5 2.2 -4.2" width="0.08" height="0.55" depth="0.2" material="color:#2980b9"></a-box>
  <a-box position="-2.4 2.2 -4.2" width="0.08" height="0.65" depth="0.2" material="color:#27ae60"></a-box>
  <a-box position="-2.3 2.2 -4.2" width="0.08" height="0.5" depth="0.2" material="color:#e67e22"></a-box>
  <a-box position="-2.2 2.2 -4.2" width="0.08" height="0.6" depth="0.2" material="color:#8e44ad"></a-box>
  <!-- WALL ART -->
  <a-box position="-2 3.5 7.0"  width="1.5" height="1"   depth="0.05" material="color:#d4c49a; roughness:0.5"></a-box>
  <a-box position="-2 3.5 7.03" width="1.6" height="1.1" depth="0.03" material="color:#3a2510; roughness:0.8"></a-box>
  <!-- CHANDELIER -->
  <a-sphere position="-1 5.5 0" radius="0.3" material="color:#fffacd; emissive:#fffacd; emissiveIntensity:1"></a-sphere>
  <a-light type="point" position="-1 5.2 0" color="#fff5c0" intensity="1.2" distance="15"></a-light>
  <a-box position="-1 5.7 0" width="0.05" height="0.5" depth="0.05" material="color:#d4af37; metalness:0.9; roughness:0.1"></a-box>
  <!-- INDOOR PLANT -->
  <a-cylinder position="5 0.3 2" radius="0.2" height="0.6" material="color:#8b5e3c; roughness:0.9"></a-cylinder>
  <a-sphere position="5 0.9 2"   radius="0.45" material="color:#2d7a2d; roughness:0.8"></a-sphere>
  <a-sphere position="5.3 1.1 2.2" radius="0.3" material="color:#36993a; roughness:0.8"></a-sphere>
  <a-sphere position="4.7 1.1 2"   radius="0.28" material="color:#2d8030; roughness:0.8"></a-sphere>
  <!-- AREA RUG -->
  <a-plane position="-1 0.025 1" rotation="-90 0 0" width="4" height="2.5"
    material="color:#9b4a2e; roughness:0.95">
  </a-plane>

  <!-- ═══ BEDROOM FURNITURE ═══ -->
  <!-- BED -->
  <a-box position="-7 0.35 -8.5"   width="3" height="0.5" depth="4.5" material="color:#5c3d1e; roughness:0.8"></a-box>
  <a-box position="-7 1.1 -10.5"   width="3.1" height="1.5" depth="0.2" material="color:#4a2d0e; roughness:0.8"></a-box>
  <a-box position="-7 0.68 -8.3"   width="2.8" height="0.3" depth="4.1" material="color:#f0ece5; roughness:0.9"></a-box>
  <a-box position="-7.5 0.87 -9.8" width="1" height="0.2" depth="0.6" material="color:#fff9f5; roughness:0.9"></a-box>
  <a-box position="-6.3 0.87 -9.8" width="1" height="0.2" depth="0.6" material="color:#f0e0d0; roughness:0.9"></a-box>
  <a-box position="-7 0.82 -7.8"   width="2.8" height="0.1" depth="2.5" material="color:#b08060; roughness:0.9"></a-box>
  <!-- WARDROBE -->
  <a-box position="-9.5 2 -8"    width="0.5" height="4" depth="3" material="color:#6b4a22; roughness:0.8"></a-box>
  <a-box position="-9.22 2 -7.1" width="0.05" height="3.5" depth="1.3" material="color:#7a5530; roughness:0.7"></a-box>
  <a-box position="-9.22 2 -8.9" width="0.05" height="3.5" depth="1.3" material="color:#7a5530; roughness:0.7"></a-box>
  <a-sphere position="-9.2 2.1 -7.6" radius="0.07" material="color:#d4af37; metalness:0.9; roughness:0.1"></a-sphere>
  <a-sphere position="-9.2 2.1 -8.4" radius="0.07" material="color:#d4af37; metalness:0.9; roughness:0.1"></a-sphere>
  <!-- BEDSIDE TABLES -->
  <a-box position="-5.3 0.45 -9.5" width="0.7" height="0.6" depth="0.7" material="color:#5c3d1e; roughness:0.8"></a-box>
  <a-box position="-8.7 0.45 -9.5" width="0.7" height="0.6" depth="0.7" material="color:#5c3d1e; roughness:0.8"></a-box>
  <!-- Bedside lamps -->
  <a-cylinder position="-5.3 0.85 -9.5" radius="0.06" height="0.35" material="color:#c0a060; metalness:0.6"></a-cylinder>
  <a-cone position="-5.3 1.15 -9.5" radius-bottom="0.2" radius-top="0.02" height="0.3" material="color:#fff5dc; emissive:#fff5dc; emissiveIntensity:0.3"></a-cone>
  <a-light type="point" position="-5.3 1 -9.5" color="#ffd090" intensity="0.5" distance="4"></a-light>
  <a-cylinder position="-8.7 0.85 -9.5" radius="0.06" height="0.35" material="color:#c0a060; metalness:0.6"></a-cylinder>
  <a-cone position="-8.7 1.15 -9.5" radius-bottom="0.2" radius-top="0.02" height="0.3" material="color:#fff5dc; emissive:#fff5dc; emissiveIntensity:0.3"></a-cone>
  <a-light type="point" position="-8.7 1 -9.5" color="#ffd090" intensity="0.5" distance="4"></a-light>
  <!-- Bedroom overhead -->
  <a-sphere position="-7 4.5 -8" radius="0.2" material="color:#fffacd; emissive:#fffacd; emissiveIntensity:1"></a-sphere>
  <a-light type="point" position="-7 4.3 -8" color="#fff5e0" intensity="0.9" distance="8"></a-light>

  <a-sphere position="0.18 0.88 9.3" radius="0.1" material="color:#b08055; roughness:0.9"></a-sphere>
  <a-cylinder position="-0.35 0.55 8.8" radius="0.05" height="0.45" rotation="0 0 30"
    material="color:#c8a070; roughness:0.9"
    animation="property: rotation; from: 0 0 20; to: 0 0 60; dur: 400; dir: alternate; loop: true; easing: easeInOutSine">
  </a-cylinder>
  <!-- Façade uplights -->
  <a-light type="spot" position="-3 0.2 7.5" rotation="-80 0 0" color="#ffeebb" intensity="1.5" angle="35" distance="10"></a-light>
  <a-light type="spot" position="2 0.2 7.5"  rotation="-80 0 0" color="#ffeebb" intensity="1.5" angle="35" distance="10"></a-light>
  <a-light type="spot" position="7 0.2 7.5"  rotation="-80 0 0" color="#ffeebb" intensity="1.2" angle="35" distance="10"></a-light>

  <!-- ═══ CAMERA / PLAYER ═══ -->
  <a-entity id="player"
    position="2 1.65 9"
    wasd-controls="speed: 5; acceleration: 20"
    look-controls="pointerLockEnabled: false">
    <a-camera>
      <a-cursor color="#e8d5a3" fuse="false" raycaster="far: 30"></a-cursor>
    </a-camera>
  </a-entity>

</a-scene>

<script>
  // ── Loading progress ──────────────────────────────────────────────
  const bar      = document.getElementById('progress-bar');
  const loadText = document.getElementById('loading-text');
  const messages = [
    'Building your villa…',
    'Filling the pool…',
    'Planting the garden…',
    'Polishing surfaces…',
    'Parking the cars…',
    'Ready to explore!'
  ];
  let pct = 0;
  const interval = setInterval(() => {
    pct += Math.random() * 18 + 5;
    if (pct > 100) pct = 100;
    bar.style.width = pct + '%';
    loadText.textContent = messages[Math.min(Math.floor(pct / 17), messages.length - 1)];
    if (pct >= 100) clearInterval(interval);
  }, 280);

  const scene = document.getElementById('main-scene');
  scene.addEventListener('loaded', () => {
    bar.style.width = '100%';
    loadText.textContent = 'Ready to explore!';
    setTimeout(() => {
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('ui-overlay').style.display = 'flex';
    }, 900);
  });

  // ── Teleport destinations ─────────────────────────────────────────
  // Positions are carefully placed on open floor space INSIDE each room,
  // clear of all furniture geometry.
  const rooms = {
    living:  { x:  1,    y: 1.65, z:  3,    label: 'Living Room'        },
    bedroom: { x: -7,    y: 1.65, z: -7.5,  label: 'Master Bedroom'     },
    kitchen: { x:  5.5,  y: 1.65, z: -3,    label: 'Kitchen'            },
    pool:    { x: 14,    y: 1.65, z:  4,    label: 'Swimming Pool'       },
    garden:  { x: -14,   y: 1.65, z:  5,    label: 'Garden & Driveway'  },
  };

  const label = document.getElementById('room-label');

  function teleport(room) {
    const r = rooms[room];
    if (!r) return;
    const player = document.getElementById('player');
    // setAttribute with an object is the reliable A-Frame way to set position
    player.setAttribute('position', { x: r.x, y: r.y, z: r.z });
    label.textContent = r.label;
    label.style.opacity = '1';
    clearTimeout(label._t);
    label._t = setTimeout(() => { label.style.opacity = '0'; }, 3500);
  }

  // ── Day / Night toggle (press N) ──────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'n' || e.key === 'N') {
      const sky    = document.querySelector('a-sky');
      const isDark = sky.getAttribute('color') === '#0a0a1a';
      sky.setAttribute('color', isDark ? '#87CEEB' : '#0a0a1a');
    }
  });
</script>
</body>
</html>
