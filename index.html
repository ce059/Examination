<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Villa Aurora – VR Experience</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/water-physics.js"></script>
  <script src="js/main.js"></script>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loader">
  <div class="loader-title">VILLA AURORA</div>
  <div class="loader-sub">Virtual Reality Experience</div>
  <div class="bar-track"><div class="bar-fill" id="bar-fill"></div></div>
  <div class="bar-pct" id="bar-pct">0%</div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="hud-top">
    <div class="brand">VILLA <em>AURORA</em></div>
    <div class="badge">VR Experience</div>
  </div>
  <div id="room-nav">
    <button class="rbtn" data-room="exterior">Exterior</button>
    <button class="rbtn" data-room="living">Living Room</button>
    <button class="rbtn" data-room="kitchen">Kitchen</button>
    <button class="rbtn" data-room="bedroom">Bedroom</button>
    <button class="rbtn" data-room="pool">Pool</button>
  </div>
  <div id="hints">WASD – Move<br>Mouse – Look<br>Nav Buttons – Teleport<br>VR – Immersive</div>
</div>
<div id="xhair"></div>

<!-- ═══════════════════════════════════════════════════════
     A-FRAME SCENE
═══════════════════════════════════════════════════════ -->
<a-scene
  renderer="antialias:true;colorManagement:true;physicallyCorrectLights:true"
  shadow="type:pcfsoft"
  fog="type:exponential;color:#c8dde8;density:0.008"
>

<!-- ══ LIGHTING ══ -->
<!-- Sun -->
<a-entity light="type:directional;color:#fff5e0;intensity:1.4;castShadow:true;
  shadowMapWidth:2048;shadowMapHeight:2048;
  shadowCameraLeft:-35;shadowCameraRight:35;shadowCameraBottom:-35;shadowCameraTop:35"
  position="20 40 -10"></a-entity>
<!-- Sky fill -->
<a-entity light="type:hemisphere;color:#b8d4f0;groundColor:#6a8a55;intensity:.7"></a-entity>
<!-- Ambient -->
<a-entity light="type:ambient;color:#a0bcd8;intensity:.4"></a-entity>


<!-- ══ SKY ══ -->
<a-sky color="#87c4e8"></a-sky>


<!-- ══ GROUND ══ -->
<!-- Lawn -->
<a-plane position="0 0 0" rotation="-90 0 0" width="120" height="120"
  material="color:#4d8040;roughness:1" shadow="receive:true"></a-plane>
<!-- Driveway -->
<a-plane position="0 .01 20" rotation="-90 0 0" width="8" height="22"
  material="color:#888078;roughness:.9" shadow="receive:true"></a-plane>
<!-- Pool deck -->
<a-plane position="0 .01 11.5" rotation="-90 0 0" width="22" height="9"
  material="color:#cfc8b8;roughness:.85" shadow="receive:true"></a-plane>
<!-- Side paths -->
<a-plane position="-13 .01 0" rotation="-90 0 0" width="2" height="20"
  material="color:#b0a898;roughness:.9"></a-plane>
<a-plane position="13 .01 0" rotation="-90 0 0" width="2" height="20"
  material="color:#b0a898;roughness:.9"></a-plane>
